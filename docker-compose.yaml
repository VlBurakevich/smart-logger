services:
  db:
    image: postgres:17-alpine
    container_name: smart_logger_db
    environment:
      POSTGRES_DB: smart_logger_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  kafka:
    image: apache/kafka:4.0.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_LOG4J_LOGGERS: org.apache.kafka=ERROR,kafka=ERROR

    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      LOGGING_LEVEL_ROOT: WARN
    depends_on:
      - kafka
    networks:
      - app-network

  core-service:
    build: ./core-service
    container_name: core-service
    depends_on:
      - kafka
      - db
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_INPUT_LOG: logs.raw
      KAFKA_TOPIC_OUTPUT_LOG: logs.processed
      KAFKA_TOPIC_INPUT_RESULT: logs.results
      SERVICE_NAME: core
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - app-network

  log-ingestion-service:
    build: ./log-ingestion-service
    container_name: log-ingestion-service
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_OUTPUT: logs.raw
      SERVICE_NAME: log-ingestion
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"
    networks:
      - app-network

  model-inference-service:
    build: ./model-inference-service
    container_name: model-inference-service
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_INPUT: logs.processed
      KAFKA_TOPIC_OUTPUT: logs.results
      KAFKA_CONSUMER_GROUP_ID: model-inference-group
      SERVICE_NAME: model-inference
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8080"
    networks:
      - app-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - kafka
      - core-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_INPUT_SUMMARY: logs.summary
      SERVICE_NAME: api-gateway
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8080"
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: