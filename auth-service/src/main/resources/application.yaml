server:
  port: 8080

jwt:
  secret:
    key: ls2cNJbDUq2wly1Q+84QqvXcdP3iasWTj0XP0sYmKP0=
  access-token:
    lifetime: 15m
  refresh-token:
    lifetime: 7d
    cleanup-interval: 1h

spring:
  application:
    name: auth-service
  cloud:
    refresh:
      enabled: false

  jpa:
    open-in-view: false
    show-sql: true

    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-service:8761/eureka/}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}