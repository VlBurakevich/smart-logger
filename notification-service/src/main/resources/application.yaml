spring:
  jpa:
    open-in-view: false
    show-sql: true

    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true