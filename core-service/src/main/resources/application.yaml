smart-logs:
  enabled: true
  account-id: udiawdIUJ123
  server-url: http://localhost:8080
  application-name: core-service
  batch-size: 1

spring:
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate

  datasource:
    url: jdbc:postgresql://smart_logger_db:5432/smart_logger_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true