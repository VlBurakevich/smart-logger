databaseChangeLog:
  - changeSet:
      id: 0
      author: admin
      changes:
        - sqlFile:
            path: classpath:/db/changelog/scripts/createLogMonitoringSettings.sql
  - changeSet:
      id: 1
      author: admin
      changes:
        - sqlFile:
            path: classpath:/db/changelog/scripts/createLogSnapshots.sql
  - changeSet:
      id: 2
      author: admin
      changes:
        - sqlFile:
            path: classpath:/db/changelog/scripts/createReports.sql